<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Enprico</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            background: white;
        }

        .auth-banner {
            flex: 1;
            background: url('images/banner 2.png') center center / cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: white;
            text-align: center;
            position: relative;
            min-height: 100vh;
        }

        .auth-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 118, 199, 0.7) 0%, rgba(12, 95, 249, 0.7) 100%);
        }

        .auth-banner-content {
            position: relative;
            z-index: 1;
        }

        .auth-banner h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .auth-banner p {
            font-size: 1.125rem;
            opacity: 0.9;
            max-width: 400px;
        }

        .auth-form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            overflow-y: auto;
        }

        .auth-card {
            background: white;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .auth-logo img {
            height: 60px;
        }

        .auth-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--gray-600);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--gray-300);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--brand-blue);
        }

        .form-error {
            color: #c00;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .form-error.active {
            display: block;
        }

        .form-success {
            color: #0a0;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .form-success.active {
            display: block;
        }

        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #0076c7 0%, var(--brand-blue) 50%, #0097e6 100%);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 118, 199, 0.3);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray-600);
        }

        .auth-footer a {
            color: var(--brand-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .password-requirements {
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-top: 0.5rem;
        }

        @media (max-width: 900px) {
            .auth-container {
                flex-direction: column;
            }

            .auth-banner {
                padding: 2rem;
                min-height: auto;
            }

            .auth-banner h2 {
                font-size: 1.75rem;
            }

            .auth-form-section {
                padding: 2rem;
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
            }

            .auth-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-banner">
            <div class="auth-banner-content">
                <h2>Join Enprico Today</h2>
                <p>Start your journey to English fluency with personalized 1-on-1 tutoring sessions.</p>
            </div>
        </div>

        <div class="auth-form-section">
            <div class="auth-card">
                <div class="auth-logo">
                    <a href="index.html">
                        <img src="images/fav icon.png" alt="Enprico Logo">
                    </a>
                </div>

                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start your English learning journey</p>

                <form id="signupForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••" minlength="6">
                    <div class="password-requirements">
                        Minimum 6 characters
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="••••••••">
                </div>

                <div class="form-error" id="formError"></div>
                <div class="form-success" id="formSuccess"></div>

                <button type="submit" class="auth-btn" id="submitBtn">
                    <span id="btnText">Create Account</span>
                </button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Log in</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { signUp, getCurrentUser } from './auth-client.js';

        // Check if already logged in
        async function checkExistingSession() {
            const { user } = await getCurrentUser();
            if (user) {
                window.location.href = 'dashboard.html';
            }
        }

        checkExistingSession();

        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const formError = document.getElementById('formError');
            const formSuccess = document.getElementById('formSuccess');

            // Reset messages
            formError.classList.remove('active');
            formSuccess.classList.remove('active');

            // Validate passwords match
            if (password !== confirmPassword) {
                formError.textContent = 'Passwords do not match';
                formError.classList.add('active');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                formError.textContent = 'Password must be at least 6 characters';
                formError.classList.add('active');
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            btnText.textContent = 'Creating account...';

            try {
                const { data, error } = await signUp(email, password, fullName);

                if (error) {
                    throw new Error(error.message);
                }

                // Success!
                formSuccess.textContent = 'Account created successfully! Please check your email to confirm.';
                formSuccess.classList.add('active');
                btnText.textContent = 'Account Created!';

                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error('Signup error:', error);

                let errorMessage = 'Failed to create account. Please try again.';

                if (error.message.includes('already registered')) {
                    errorMessage = 'This email is already registered. Please log in instead.';
                } else if (error.message.includes('invalid email')) {
                    errorMessage = 'Please enter a valid email address.';
                } else if (error.message) {
                    errorMessage = error.message;
                }

                formError.textContent = errorMessage;
                formError.classList.add('active');

                // Re-enable button
                submitBtn.disabled = false;
                btnText.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
